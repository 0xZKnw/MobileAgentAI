name: Build Debug APK

on:
  push:
    branches: [main, master, dev, 'copilot/**']
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Sync and update submodules (shallow, ~50 MB instead of 500 MB+)
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth 1

      - name: Validate llama.cpp submodule
        run: |
          if [ ! -d "llama.cpp" ] || [ ! -f "llama.cpp/CMakeLists.txt" ]; then
            echo "ERROR: llama.cpp submodule is missing or not initialized"
            exit 1
          fi
          echo "llama.cpp submodule OK"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up NDK r29
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r29
          link-to-sdk: true
          add-to-path: false

      - name: Export NDK env vars and write local.properties
        run: |
          echo "ANDROID_NDK_ROOT=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> $GITHUB_ENV
          echo "ndk.dir=${{ steps.setup-ndk.outputs.ndk-path }}" >> local.properties

      - name: Cache NDK C++ build outputs (avoids 20-40 min full recompile)
        uses: actions/cache@v4
        with:
          path: |
            lib/.cxx
            app/.cxx
          key: ndk-build-${{ runner.os }}-${{ hashFiles('lib/src/main/cpp/CMakeLists.txt', 'llama.cpp/CMakeLists.txt') }}
          restore-keys: |
            ndk-build-${{ runner.os }}-

      - name: Validate Gradle wrapper
        run: |
          if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
            echo "ERROR: gradle/wrapper/gradle-wrapper.jar is missing"
            exit 1
          fi
          echo "gradle-wrapper.jar OK"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace --no-daemon

      - name: Upload APK artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Generate release tag
        id: release-tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u +"%Y%m%d-%H%M%S")
          echo "tag=build-${TIMESTAMP}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (every push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-tag.outputs.tag }}
          files: app/build/outputs/apk/debug/*.apk
          name: MobileAgentAI ${{ steps.release-tag.outputs.tag }}
          body: |
            ## MobileAgentAI ${{ steps.release-tag.outputs.tag }}
            Debug APK — runs GGUF models locally on Android (Samsung Galaxy S24 optimized).
            Built from commit ${{ github.sha }} on branch `${{ github.ref_name }}`.

            ### Install
            1. Enable **Install unknown apps** for your browser/Files app
            2. Download the `.apk` file below
            3. Tap to install

            ### First use
            - Tap the model icon → import a `.gguf` file (Qwen3 0.6B–4B recommended)
            - Start chatting
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
